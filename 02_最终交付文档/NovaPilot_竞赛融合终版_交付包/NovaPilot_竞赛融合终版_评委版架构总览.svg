<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">NovaPilot竞赛评委版架构总览</title>
  <desc id="desc">六层科研客服智能体架构，突出A2运行时、L1到L2受治理进化、有据才答、人审关口及科学建议与商业推荐隔离。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#16324F" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2E74B5"/>
    </marker>
    <marker id="arrow-amber" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#C87400"/>
    </marker>
    <style>
      .cn{font-family:"PingFang SC","Microsoft YaHei","STHeiti",sans-serif}
      .title{font-size:33px;font-weight:700;fill:#123B5D}
      .subtitle{font-size:15px;fill:#667085}
      .slogan{font-size:17px;font-weight:700;fill:#0F8B8D}
      .layerTitle{font-size:18px;font-weight:700;fill:#123B5D}
      .layerSub{font-size:12px;fill:#667085}
      .chip{font-size:12px;fill:#22384A}
      .chipStrong{font-size:12px;font-weight:700;fill:#FFFFFF}
      .small{font-size:11px;fill:#667085}
      .boundaryTitle{font-size:14px;font-weight:700;fill:#123B5D}
      .boundaryText{font-size:11px;fill:#526273}
    </style>
  </defs>

  <rect width="1200" height="760" fill="#F3F6FA"/>
  <text x="600" y="48" text-anchor="middle" class="cn title">NovaPilot 科研服务操作系统｜评委版架构总览</text>
  <text x="600" y="76" text-anchor="middle" class="cn subtitle">前台讲清可信闭环，后台保留项目记忆、工具执行、专家协同与企业治理</text>
  <text x="600" y="106" text-anchor="middle" class="cn slogan">不做会自我进化的黑箱，做越用越可信的科研服务闭环</text>

  <!-- Layer 1 -->
  <g filter="url(#shadow)">
    <rect x="70" y="132" width="1060" height="76" rx="16" fill="#FFFFFF" stroke="#D9E1EB"/>
    <rect x="70" y="132" width="12" height="76" rx="6" fill="#64748B"/>
  </g>
  <circle cx="110" cy="170" r="18" fill="#64748B"/>
  <text x="110" y="176" text-anchor="middle" class="cn chipStrong">1</text>
  <text x="140" y="162" class="cn layerTitle">接入与角色工作台</text>
  <text x="140" y="185" class="cn layerSub">统一入口；语言与角色正交；共享同一项目事实</text>
  <g>
    <rect x="430" y="150" width="126" height="38" rx="10" fill="#F2F5F8" stroke="#CDD6E1"/>
    <text x="493" y="174" text-anchor="middle" class="cn chip">PI · 决策摘要</text>
    <rect x="568" y="150" width="134" height="38" rx="10" fill="#F2F5F8" stroke="#CDD6E1"/>
    <text x="635" y="174" text-anchor="middle" class="cn chip">博后 · 参数协作</text>
    <rect x="714" y="150" width="134" height="38" rx="10" fill="#F2F5F8" stroke="#CDD6E1"/>
    <text x="781" y="174" text-anchor="middle" class="cn chip">学生 · 学习向导</text>
    <rect x="860" y="150" width="148" height="38" rx="10" fill="#F2F5F8" stroke="#CDD6E1"/>
    <text x="934" y="174" text-anchor="middle" class="cn chip">企业 · 交付治理</text>
    <rect x="1020" y="150" width="88" height="38" rx="10" fill="#F2F5F8" stroke="#CDD6E1"/>
    <text x="1064" y="174" text-anchor="middle" class="cn chip">中 / 英 / 日</text>
  </g>

  <path d="M600 210 L600 228" stroke="#2E74B5" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Layer 2 -->
  <g filter="url(#shadow)">
    <rect x="70" y="234" width="1060" height="112" rx="16" fill="#FFFFFF" stroke="#B9D0E8"/>
    <rect x="70" y="234" width="12" height="112" rx="6" fill="#2E74B5"/>
  </g>
  <circle cx="110" cy="272" r="18" fill="#2E74B5"/>
  <text x="110" y="278" text-anchor="middle" class="cn chipStrong">2</text>
  <text x="140" y="264" class="cn layerTitle">A2 有状态 Agentic RAG 运行时</text>
  <text x="140" y="287" class="cn layerSub">多轮咨询、槽位追问、证据检索、工具调用和主动转人工；A3仅限后续沙箱候选</text>
  <g>
    <rect x="188" y="305" width="86" height="27" rx="14" fill="#E9F1FA" stroke="#9FC0E3"/>
    <text x="231" y="323" text-anchor="middle" class="cn chip">意图识别</text>
    <text x="286" y="323" class="cn chip">›</text>
    <rect x="302" y="305" width="90" height="27" rx="14" fill="#E9F1FA" stroke="#9FC0E3"/>
    <text x="347" y="323" text-anchor="middle" class="cn chip">项目建档</text>
    <text x="404" y="323" class="cn chip">›</text>
    <rect x="420" y="305" width="90" height="27" rx="14" fill="#E9F1FA" stroke="#9FC0E3"/>
    <text x="465" y="323" text-anchor="middle" class="cn chip">最小追问</text>
    <text x="522" y="323" class="cn chip">›</text>
    <rect x="538" y="305" width="86" height="27" rx="14" fill="#E9F1FA" stroke="#9FC0E3"/>
    <text x="581" y="323" text-anchor="middle" class="cn chip">混合检索</text>
    <text x="636" y="323" class="cn chip">›</text>
    <rect x="652" y="305" width="86" height="27" rx="14" fill="#E9F1FA" stroke="#9FC0E3"/>
    <text x="695" y="323" text-anchor="middle" class="cn chip">方案生成</text>
    <text x="750" y="323" class="cn chip">›</text>
    <rect x="766" y="305" width="94" height="27" rx="14" fill="#FFF1DA" stroke="#D99A42"/>
    <text x="813" y="323" text-anchor="middle" class="cn chip">证据门控</text>
    <text x="872" y="323" class="cn chip">›</text>
    <rect x="888" y="305" width="94" height="27" rx="14" fill="#FFF1DA" stroke="#D99A42"/>
    <text x="935" y="323" text-anchor="middle" class="cn chip">升级判定</text>
    <text x="994" y="323" class="cn chip">›</text>
    <rect x="1010" y="305" width="94" height="27" rx="14" fill="#E9F1FA" stroke="#9FC0E3"/>
    <text x="1057" y="323" text-anchor="middle" class="cn chip">引用渲染</text>
  </g>

  <path d="M600 348 L600 366" stroke="#2E74B5" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Layer 3 & 4 -->
  <g filter="url(#shadow)">
    <rect x="70" y="372" width="512" height="132" rx="16" fill="#FFFFFF" stroke="#9FD5CF"/>
    <rect x="70" y="372" width="12" height="132" rx="6" fill="#0F8B8D"/>
    <rect x="618" y="372" width="512" height="132" rx="16" fill="#FFFFFF" stroke="#E7BE7E"/>
    <rect x="618" y="372" width="12" height="132" rx="6" fill="#C87400"/>
  </g>
  <circle cx="110" cy="410" r="18" fill="#0F8B8D"/><text x="110" y="416" text-anchor="middle" class="cn chipStrong">3</text>
  <text x="140" y="402" class="cn layerTitle">循证知识层</text>
  <text x="140" y="425" class="cn layerSub">有据才答的物理基础；图只用在高价值选型关系</text>
  <rect x="104" y="446" width="164" height="34" rx="9" fill="#0F8B8D"/>
  <text x="186" y="468" text-anchor="middle" class="cn chipStrong">混合检索＋Reranker</text>
  <rect x="280" y="446" width="130" height="34" rx="9" fill="#E8F5F3" stroke="#74BEB7"/>
  <text x="345" y="468" text-anchor="middle" class="cn chip">轻量决策本体</text>
  <rect x="422" y="446" width="130" height="34" rx="9" fill="#E8F5F3" stroke="#74BEB7"/>
  <text x="487" y="468" text-anchor="middle" class="cn chip">术语与可溯源引用</text>

  <circle cx="658" cy="410" r="18" fill="#C87400"/><text x="658" y="416" text-anchor="middle" class="cn chipStrong">4</text>
  <text x="688" y="402" class="cn layerTitle">专家协同与人审关口</text>
  <text x="688" y="425" class="cn layerSub">转人工不是失败出口，而是服务质量与知识进化的关键节点</text>
  <rect x="652" y="446" width="132" height="34" rx="9" fill="#C87400"/>
  <text x="718" y="468" text-anchor="middle" class="cn chipStrong">一次性交接包</text>
  <rect x="796" y="446" width="132" height="34" rx="9" fill="#FFF4E3" stroke="#DBA34E"/>
  <text x="862" y="468" text-anchor="middle" class="cn chip">就地审核候选</text>
  <rect x="940" y="446" width="160" height="34" rx="9" fill="#FFF4E3" stroke="#DBA34E"/>
  <text x="1020" y="468" text-anchor="middle" class="cn chip">Owner＋有效期＋回滚</text>

  <path d="M620 438 C585 438 585 438 584 438" stroke="#C87400" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow-amber)"/>

  <path d="M600 506 L600 524" stroke="#2E74B5" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Layer 5 & 6 -->
  <g filter="url(#shadow)">
    <rect x="70" y="530" width="512" height="102" rx="16" fill="#FFFFFF" stroke="#C6B5EB"/>
    <rect x="70" y="530" width="12" height="102" rx="6" fill="#7153A6"/>
    <rect x="618" y="530" width="512" height="102" rx="16" fill="#FFFFFF" stroke="#F0A8CC"/>
    <rect x="618" y="530" width="12" height="102" rx="6" fill="#C72E75"/>
  </g>
  <circle cx="110" cy="568" r="18" fill="#7153A6"/><text x="110" y="574" text-anchor="middle" class="cn chipStrong">5</text>
  <text x="140" y="560" class="cn layerTitle">NovaBench 评估运营</text>
  <text x="140" y="583" class="cn layerSub">金标回归＋专家抽审＋校准裁判；安全指标独立门禁</text>
  <rect x="140" y="595" width="390" height="26" rx="13" fill="#7153A6"/>
  <text x="335" y="613" text-anchor="middle" class="cn chipStrong">正确解决率 · 恰当升级率 · 自信错答率</text>

  <circle cx="658" cy="568" r="18" fill="#C72E75"/><text x="658" y="574" text-anchor="middle" class="cn chipStrong">6</text>
  <text x="688" y="560" class="cn layerTitle">授权式增长闭环</text>
  <text x="688" y="583" class="cn layerSub">科学建议与商业推荐视觉隔离；仅在真实意向出现后触发</text>
  <rect x="688" y="595" width="390" height="26" rx="13" fill="#C72E75"/>
  <text x="883" y="613" text-anchor="middle" class="cn chipStrong">信任复利 → 客户授权 → CRM与专家服务</text>

  <!-- Boundaries -->
  <rect x="70" y="658" width="515" height="64" rx="14" fill="#EAF2FB" stroke="#A5C4E4"/>
  <text x="96" y="682" class="cn boundaryTitle">运行时自主度：MVP锁定 A2</text>
  <text x="96" y="704" class="cn boundaryText">咨询、追问、检索、工具调用与转人工；受限A3仅在沙箱评测优于基线后开放。</text>
  <rect x="615" y="658" width="515" height="64" rx="14" fill="#FFF2DF" stroke="#E0B46E"/>
  <text x="641" y="682" class="cn boundaryTitle">跨会话进化：生产锁定 L1 → L2</text>
  <text x="641" y="704" class="cn boundaryText">候选知识与策略必须经NovaBench、Owner审批、灰度和回滚；禁止直接全局写入。</text>
  <text x="600" y="746" text-anchor="middle" class="cn small">评委版讲清“可信—协同—进化—增长”；详细工程拓扑由NovaPilot整体技术架构图补充。</text>
</svg>
