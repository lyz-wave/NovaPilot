    <path d="M555 695 L555 733" class="line"/>
    <path d="M1045 695 L1045 733" class="line"/>
    <rect x="70" y="733" width="700" height="243" rx="22" fill="#FFFFFF" stroke="#AFC7DA" stroke-width="2" filter="url(#shadow)"/>
    <rect x="70" y="733" width="170" height="243" rx="22" fill="url(#blueGrad)"/>
    <rect x="218" y="733" width="22" height="243" fill="url(#blueGrad)"/>
    <text x="155" y="832" text-anchor="middle" class="layerLabel">循证知识层</text>
    <text x="155" y="859" text-anchor="middle" class="whiteText">回答必须绑定证据</text>

    <rect x="270" y="760" width="220" height="82" rx="14" fill="#E8EEF5"/>
    <text x="380" y="789" text-anchor="middle" class="boxTitle">混合RAG</text>
    <text x="380" y="815" text-anchor="middle" class="boxText">BM25 + 向量 + Reranker</text>
    <rect x="510" y="760" width="225" height="82" rx="14" fill="#E7F4F4"/>
    <text x="622.5" y="789" text-anchor="middle" class="boxTitle">科研知识图谱</text>
    <text x="622.5" y="815" text-anchor="middle" class="boxText">实体、约束、因果与风险</text>
    <rect x="270" y="862" width="220" height="82" rx="14" fill="#F2EEFA"/>
    <text x="380" y="891" text-anchor="middle" class="boxTitle">证据核验器</text>
    <text x="380" y="917" text-anchor="middle" class="boxText">DOI/PMID · 引用 · 适用性</text>
    <rect x="510" y="862" width="225" height="82" rx="14" fill="#F4F6F9"/>
    <text x="622.5" y="891" text-anchor="middle" class="boxTitle">知识资产</text>
    <text x="622.5" y="917" text-anchor="middle" class="boxText">SOP / FAQ / 工单 / SCI</text>

    <rect x="800" y="733" width="730" height="243" rx="22" fill="#FFFFFF" stroke="#A8D3D4" stroke-width="2" filter="url(#shadow)"/>
    <rect x="800" y="733" width="170" height="243" rx="22" fill="url(#tealGrad)"/>
    <rect x="948" y="733" width="22" height="243" fill="url(#tealGrad)"/>
    <text x="885" y="832" text-anchor="middle" class="layerLabel">科研工具层</text>
    <text x="885" y="859" text-anchor="middle" class="whiteText">从回答走向执行</text>

    <rect x="1000" y="760" width="220" height="82" rx="14" fill="#E7F4F4"/>
    <text x="1110" y="789" text-anchor="middle" class="boxTitle">文献与数据库</text>
    <text x="1110" y="815" text-anchor="middle" class="boxText">PubMed / Crossref / 内部库</text>
    <rect x="1240" y="760" width="255" height="82" rx="14" fill="#E8F5EF"/>
    <text x="1367.5" y="789" text-anchor="middle" class="boxTitle">生信执行沙箱</text>
    <text x="1367.5" y="815" text-anchor="middle" class="boxText">Nextflow / Snakemake / K8s</text>
    <rect x="1000" y="862" width="220" height="82" rx="14" fill="#FFF4DB"/>
    <text x="1110" y="891" text-anchor="middle" class="boxTitle">科研计算工具</text>
    <text x="1110" y="917" text-anchor="middle" class="boxText">质控 / 测序量 / 统计 / 作图</text>
    <rect x="1240" y="862" width="255" height="82" rx="14" fill="#FDECEC"/>
    <text x="1367.5" y="891" text-anchor="middle" class="boxTitle">业务系统连接</text>
    <text x="1367.5" y="917" text-anchor="middle" class="boxText">CRM / 工单 / 报价 / 样本系统</text>

    <!-- Bottom operations -->
    <path d="M420 976 L420 1010" class="line"/>
    <path d="M1165 976 L1165 1010" class="line"/>
    <rect x="70" y="1010" width="1460" height="112" rx="22" fill="#FFFFFF" stroke="#C9D8E5" stroke-width="2"/>
    <rect x="90" y="1030" width="330" height="72" rx="16" fill="#FDECEC" stroke="#A63A3A" stroke-width="2"/>
    <text x="255" y="1058" text-anchor="middle" class="boxTitle">NovaGuard 可信控制塔</text>
    <text x="255" y="1084" text-anchor="middle" class="boxText">轨迹监督 · 风险门控 · 权限 · 回滚</text>

    <rect x="445" y="1030" width="330" height="72" rx="16" fill="#FFF4DB" stroke="#D59A28" stroke-width="2"/>
    <text x="610" y="1058" text-anchor="middle" class="boxTitle">解决方案专家工作台</text>
    <text x="610" y="1084" text-anchor="middle" class="boxText">上下文交接 · 审核 · 接管 · 反馈</text>

    <rect x="800" y="1030" width="330" height="72" rx="16" fill="#E8EEF5" stroke="#2E74B5" stroke-width="2"/>
    <text x="965" y="1058" text-anchor="middle" class="boxTitle">NovaBench 科研评测</text>
    <text x="965" y="1084" text-anchor="middle" class="boxText">金标任务 · 附件 · 引用 · 安全门禁</text>

    <rect x="1155" y="1030" width="355" height="72" rx="16" fill="#E7F4F4" stroke="#0F8B8D" stroke-width="2"/>
    <text x="1332.5" y="1058" text-anchor="middle" class="boxTitle">NovaEvolve 受治理自进化</text>
    <text x="1332.5" y="1084" text-anchor="middle" class="boxText">观察 → 候选能力 → 评测 → 灰度 → 回滚</text>

    <!-- Feedback loop -->
    <path d="M1332 1030 C1515 980 1545 520 1490 430" class="dash"/>
    <text x="1518" y="720" transform="rotate(-90 1518 720)" text-anchor="middle" class="tag">仅将评测通过的能力回灌生产</text>

    <!-- Foundation label -->
    <text x="800" y="1155" text-anchor="middle" class="small">
      数据与基础设施：PostgreSQL · OpenSearch · Neo4j · MinIO/S3 · Redis · vLLM · Docker/Kubernetes · OpenTelemetry · Prometheus/Grafana
    </text>
